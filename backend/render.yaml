services:
  - type: web
    name: trading-signal-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        fromRender: PORT
      - file: .env
    rootDir: backend
    plan: free
    healthCheckPath: /health
